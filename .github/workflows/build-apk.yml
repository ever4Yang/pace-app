name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview

jobs:
  build:
    name: Build Android APK (${{ github.event.inputs.profile }})
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK with EAS
        id: eas-build
        run: |
          OUTPUT=$(eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile }} \
            --non-interactive \
            --wait \
            --json \
            2>/dev/null)
          URL=$(echo "$OUTPUT" | jq -r '.[0].artifacts.buildUrl')
          echo "apk_url=$URL" >> $GITHUB_OUTPUT

      - name: Download APK
        run: |
          curl -L "${{ steps.eas-build.outputs.apk_url }}" \
            -o "pace-${{ github.event.inputs.profile }}.apk"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pace-android-${{ github.event.inputs.profile }}-${{ github.run_number }}
          path: pace-${{ github.event.inputs.profile }}.apk
          retention-days: 30

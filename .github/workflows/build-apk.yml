name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview

jobs:
  build:
    name: Build Android APK (${{ github.event.inputs.profile }})
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK with EAS
        id: eas-build
        run: |
          OUTPUT=$(eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile }} \
            --non-interactive \
            --wait \
            --json \
            2>/dev/null)
          URL=$(echo "$OUTPUT" | jq -r '.[0].artifacts.buildUrl')
          echo "apk_url=$URL" >> $GITHUB_OUTPUT

      - name: Download APK
        run: |
          curl -L "${{ steps.eas-build.outputs.apk_url }}" \
            -o "pace-${{ github.event.inputs.profile }}.apk"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pace-android-${{ github.event.inputs.profile }}-${{ github.run_number }}
          path: pace-${{ github.event.inputs.profile }}.apk
          retention-days: 30

      - name: Collect release metadata
        id: meta
        run: |
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          echo "commit_hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "commit_time=$(git log -1 --format='%ci')" >> $GITHUB_OUTPUT
          echo "commit_msg=$(git log -1 --format='%s')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.date }}-${{ github.event.repository.name }}-${{ github.run_number }}
          name: ${{ steps.meta.outputs.date }}-${{ github.event.repository.name }}-${{ github.run_number }}
          body: |
            ## Build Info
            - **Profile:** ${{ github.event.inputs.profile }}
            - **Run:** #${{ github.run_number }}

            ## Commit
            - **Message:** ${{ steps.meta.outputs.commit_msg }}
            - **Hash:** `${{ steps.meta.outputs.commit_hash }}`
            - **Time:** ${{ steps.meta.outputs.commit_time }}
          files: pace-${{ github.event.inputs.profile }}.apk

name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: Build iOS IPA (${{ github.event.inputs.profile }})
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build IPA with EAS
        id: eas-build
        run: |
          eas build \
            --platform ios \
            --profile ${{ github.event.inputs.profile }} \
            --non-interactive \
            --wait \
            --json > build-output.json
          URL=$(jq -r '.[0].artifacts.buildUrl' build-output.json)
          echo "ipa_url=$URL" >> $GITHUB_OUTPUT

      - name: Download IPA
        run: |
          curl -L "${{ steps.eas-build.outputs.ipa_url }}" \
            -o "pace-${{ github.event.inputs.profile }}.ipa"

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pace-ios-${{ github.event.inputs.profile }}-${{ github.run_number }}
          path: pace-${{ github.event.inputs.profile }}.ipa
          retention-days: 30
